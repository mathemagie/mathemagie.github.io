/* === CSS Reset & Base Styles === */
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    min-height: 100vh;
    background-color: #1a1a1a;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1rem;
    font-family: 'Share Tech Mono', 'VT323', monospace;
}

.screen-content, .minitel-header, .title-bar, .footer {
    text-rendering: optimizeLegibility;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
}

/* === Container === */
.minitel-container {
    position: relative;
    background-color: #e8e4d9;
    padding: 2rem;
    padding-bottom: 3rem;
    border-radius: 0.5rem;
    box-shadow: 0 20px 50px rgba(0,0,0,0.5), inset 0 2px 5px rgba(255,255,255,0.4);
    max-width: 48rem;
    width: 100%;
    border-bottom: 12px solid #d1cdc2;
    border-right: 12px solid #d1cdc2;
}

.brand-label {
    position: absolute; top: 0.75rem; left: 2rem;
    color: #8a8578; font-family: sans-serif; font-weight: bold;
    font-size: 0.75rem; letter-spacing: 0.1em;
}

/* === CRT Screen === */
.crt-screen {
    position: relative;
    background-color: black;
    border-radius: 0.5rem 0.5rem 1.5rem 1.5rem;
    overflow: hidden;
    box-shadow: inset 0 0 20px rgba(0,0,0,1), 0 0 1px rgba(255,255,255,0.1);
    border: 16px solid #333;
    height: min(47rem, calc(100vh - 6rem));
}

/* === CRT Overlay Effects === */
.crt-overlay {
    pointer-events: none; position: absolute; inset: 0; z-index: 50;
    overflow: hidden; border-radius: 0.5rem;
    --signal-quality: 1; --scanline-opacity: 0.3; --static-opacity: 0; --glow-intensity: 1;
}
.scanlines {
    position: absolute; inset: 0;
    background: linear-gradient(rgba(0,0,0,0) 50%, rgba(0,0,0,var(--scanline-opacity)) 50%),
                linear-gradient(90deg, rgba(0,255,255,0.03), rgba(0,255,255,0.01), rgba(0,255,255,0.03));
    background-size: 100% 3px, 2px 100%;
    pointer-events: none; transition: background 0.5s ease;
}
.static-noise {
    position: absolute; inset: 0; opacity: var(--static-opacity);
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
    pointer-events: none; mix-blend-mode: overlay; transition: opacity 0.5s ease;
}
.flicker { position: absolute; inset: 0; background-color: white; opacity: 0.02; animation: flicker 0.3s infinite; pointer-events: none; }
.vignette { position: absolute; inset: 0; background: radial-gradient(circle, rgba(0,0,0,0) 60%, rgba(0,0,0,0.6) 100%); pointer-events: none; }

/* === Screen Content === */
.screen-content {
    position: relative; z-index: 10; height: 100%;
    display: flex; flex-direction: column; padding: 1rem;
    color: #00FFFF; font-family: 'Share Tech Mono', monospace;
    line-height: 1.4; font-size: 0.9rem;
    text-shadow: 0 0 calc(3px * var(--glow-intensity, 1)) rgba(0,255,255,calc(0.5 * var(--glow-intensity, 1)));
}

/* === Connection States === */
.init-screen { height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1rem; }
.init-dot { color: #00FFFF; font-size: 1.5rem; animation: pulse 2s infinite; text-shadow: 0 0 5px rgba(0,255,255,0.8); }

/* === Header === */
.minitel-header {

.audio-unlock-prompt {

.error-screen { height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1rem; color: #FF0000; text-shadow: 0 0 5px rgba(255,0,0,0.8); }

<body>
    <main class="minitel-container">
        <span class="brand-label" aria-hidden="true">MINITEL</span>

        <div class="crt-screen" role="application" aria-label="Terminal 3615 TERRE - Ecoute Aveugle">
            <div class="crt-overlay" id="crtOverlay" aria-hidden="true">
                <div class="scanlines"></div>
                <div class="static-noise"></div>
                <div class="flicker"></div>
                <div class="vignette"></div>
            </div>

            <div class="screen-content" id="screenContent" role="region" aria-live="polite">
            </div>
        </div>

        <div class="power-light" aria-hidden="true">
            <div class="power-dot"></div>
            <span class="power-label">POWER</span>
        </div>
    </main>

    <!-- Hidden Audio Elements for Crossfade -->
    <audio id="audioPlayer1" crossorigin="anonymous"></audio>
    <audio id="audioPlayer2" crossorigin="anonymous"></audio>

    <!-- Leaflet for reveal map -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" defer></script>

    <script>
        // =============================================
        // AUDIO ENGINE (preserved from original)
        // =============================================

        const ISS_REFRESH_RATE = 3000;
        const CROSSFADE_DURATION = 2000;
        const ARCHIVE_API = 'https://archive.org/advancedsearch.php';
        const SOUND_BATCH_SIZE = 5000;

        // === State ===
        let issData = null;
        let soundLocations = [];
        let currentSoundLocation = null;
        let currentTrack = null;
        let isLoadingLocations = true;
        let isLoadingISS = true;
        let connectionStep = 0;
        let trace = [];
        let volume = 0.7;
        let isMuted = false;
        let activePlayer = 1;
        let isPlaying = false;
        let signalQuality = 1.0;
        let currentLocationInfo = null;
        const geocodeCache = new Map();

        const audioPlayer1 = document.getElementById('audioPlayer1');
        const audioPlayer2 = document.getElementById('audioPlayer2');

        let audioContext = null;
        let gainNode1 = null;
        let gainNode2 = null;
        let filterNode = null;
        let noiseGainNode = null;
        let noiseSource = null;
        let crossfadeIntervalId = null;
        let isFindingSound = false;
        let issPollIntervalId = null;
        let isFetchingISS = false;
        let issFetchController = null;
        let soundFetchController = null;
        let issConsecutiveErrors = 0;
        let connectionError = false;
        let audioUnlocked = false;
        let lastSearchLat = null;
        let lastSearchLon = null;
        let renderScheduled = false;
        let lastNearestResult = null;

        // === ISS Fetch ===
        async function fetchISS() {
            if (isFetchingISS) return;
            isFetchingISS = true;
            try {
                if (issFetchController) issFetchController.abort();
                issFetchController = new AbortController();
                const response = await fetch('https://api.wheretheiss.at/v1/satellites/25544', { signal: issFetchController.signal });
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const data = await response.json();
                issData = data;
                trace.push({ lat: data.latitude, lon: data.longitude });
                if (trace.length > 20) trace.shift();
                isLoadingISS = false;
                issConsecutiveErrors = 0;
                connectionError = false;
                if (soundLocations.length > 0) findAndPlayNearestSound();
                render();
            } catch (error) {
                if (error.name === 'AbortError') return;
                console.error("ISS API Error:", error);
                issConsecutiveErrors++;
                if (issConsecutiveErrors >= 3) { connectionError = true; render(); }
            } finally {
                isFetchingISS = false;
            }
        }

        function parseCoverage(coverage) {
            if (!coverage) return null;
            const latMatch = coverage.match(/latitude=([+-]?\d+\.?\d*)/);
            const lonMatch = coverage.match(/longitude=([+-]?\d+\.?\d*)/);
            const nameMatch = coverage.match(/name=([^;]+)/);
            if (latMatch && lonMatch) {
                return { lat: parseFloat(latMatch[1]), lng: parseFloat(lonMatch[1]), name: nameMatch ? nameMatch[1].trim() : 'Unknown Location' };
            }
            return null;
        }

        async function fetchSoundLocations() {
            try {
                const cacheKey = 'iss_earth_sound_locations';
                const cacheExpiry = 24 * 60 * 60 * 1000;
                const cached = localStorage.getItem(cacheKey);
                if (cached) {
                    try {
                        const { data, timestamp } = JSON.parse(cached);
                        if (Date.now() - timestamp < cacheExpiry) {
                            soundLocations = data;
                            isLoadingLocations = false;
                            console.log(`3615 TERRE: ${soundLocations.length} lieux sonores charges (cache)`);
                            render();
                            return;
                        }
                    } catch (e) {}
                }
                const url = `${ARCHIVE_API}?q=collection:radio-aporee-maps&fl[]=identifier,title,creator,coverage&output=json&rows=${SOUND_BATCH_SIZE}`;
                const response = await fetch(url);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const data = await response.json();
                if (data.response && data.response.docs) {
                    soundLocations = data.response.docs
                        .map(doc => {
                            const coords = parseCoverage(doc.coverage);
                            if (coords) return { identifier: doc.identifier, title: doc.title || coords.name, creator: doc.creator, lat: coords.lat, lng: coords.lng, locationName: coords.name };
                            return null;
                        })
                        .filter(loc => loc !== null);
                    try { localStorage.setItem(cacheKey, JSON.stringify({ data: soundLocations, timestamp: Date.now() })); } catch (e) {}
                }
                isLoadingLocations = false;
                console.log(`3615 TERRE: ${soundLocations.length} lieux sonores charges`);
                render();
            } catch (error) {
                console.error("Archive.org API Error:", error);
                isLoadingLocations = false;
            }
        }

        async function getAudioUrl(identifier, signal) {
            try {
                const response = await fetch(`https://archive.org/metadata/${identifier}`, { signal });
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const data = await response.json();
                if (data.files) {
                    const mp3File = data.files.find(f => f.name.endsWith('.mp3') && f.source === 'original') || data.files.find(f => f.name.endsWith('.mp3'));
                    if (mp3File) return `https://archive.org/download/${identifier}/${encodeURIComponent(mp3File.name)}`;
                }
                return null;
            } catch (error) {
                if (error.name === 'AbortError') return null;
                console.error('Error fetching audio metadata:', error);
                return null;
            }
        }

        function haversine(lat1, lon1, lat2, lon2) {
            const R = 6371;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2)**2 + Math.cos(lat1 * Math.PI/180) * Math.cos(lat2 * Math.PI/180) * Math.sin(dLon/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        function calculateSignalQuality(distance) {
            if (distance < 500) return 1.0;
            if (distance < 2000) return 0.7 + (0.3 * (1 - (distance - 500) / 1500));
            if (distance < 5000) return 0.3 + (0.4 * (1 - (distance - 2000) / 3000));
            return Math.max(0, 0.3 * (1 - (distance - 5000) / 5000));
        }

        function updateCRTEffects(quality) {
            signalQuality = quality;
            const overlay = document.getElementById('crtOverlay');
            if (!overlay) return;
            const scanlineOpacity = 0.3 + (1 - quality) * 0.5;
            const staticOpacity = (1 - quality) * 0.05;
            const glowIntensity = 0.6 + quality * 0.4;
            overlay.style.setProperty('--signal-quality', quality);
            overlay.style.setProperty('--scanline-opacity', scanlineOpacity);
            overlay.style.setProperty('--static-opacity', staticOpacity);
            overlay.style.setProperty('--glow-intensity', glowIntensity);
            const screenContent = document.getElementById('screenContent');
            if (screenContent) screenContent.style.setProperty('--glow-intensity', glowIntensity);
        }

        async function geocodeLocation(lat, lng, signal) {
            const cacheKey = `${lat.toFixed(2)},${lng.toFixed(2)}`;
            if (geocodeCache.has(cacheKey)) {
                const value = geocodeCache.get(cacheKey);
                geocodeCache.delete(cacheKey);
                geocodeCache.set(cacheKey, value);
                return value;
            }
            try {
                const response = await fetch(`https://api.bigdatacloud.net/data/reverse-geocode-client?latitude=${lat}&longitude=${lng}&localityLanguage=fr`, { signal });
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const data = await response.json();
                const locationInfo = {
                    country: data.countryName || null,
                    region: data.principalSubdivision || null,
                    city: data.city || data.locality || null,
                    timezone: data.localityInfo?.informative?.find(i => i.description === 'time zone')?.name || null
                };
                if (geocodeCache.size >= 200) { geocodeCache.delete(geocodeCache.keys().next().value); }
                geocodeCache.set(cacheKey, locationInfo);
                return locationInfo;
            } catch (error) {
                if (error.name === 'AbortError') return null;
                console.error('Geocoding error:', error);
                return null;
            }
        }

        function getLocalTime(timezone) {
            if (!timezone) return null;
            try { return new Date().toLocaleTimeString('en-US', { timeZone: timezone, hour: '2-digit', minute: '2-digit', hour12: false }); } catch (e) { return null; }
        }

        function formatLocationInfo(info) {
            if (!info) return null;
            const parts = [];
            if (info.country) parts.push(info.country);
            if (info.region && info.region !== info.country) parts.push(info.region);
            if (info.city) parts.push(`pres de ${info.city}`);
            const localTime = getLocalTime(info.timezone);
            if (localTime) parts.push(`${localTime} heure locale`);
            return parts.length > 0 ? parts.join(' \u00B7 ') : null;
        }

        function findNearestSoundLocation() {
            if (!issData || soundLocations.length === 0) return null;
            if (lastSearchLat !== null && lastSearchLon !== null && lastNearestResult) {
                const moved = haversine(lastSearchLat, lastSearchLon, issData.latitude, issData.longitude);
                if (moved < 50) {
                    lastNearestResult.distance = haversine(issData.latitude, issData.longitude, lastNearestResult.lat, lastNearestResult.lng);
                    return lastNearestResult;
                }
            }
            let nearest = null;
            let minDistance = Infinity;
            for (const loc of soundLocations) {
                const dist = haversine(issData.latitude, issData.longitude, loc.lat, loc.lng);
                if (dist < minDistance) { minDistance = dist; nearest = { ...loc, distance: dist }; }
            }
            lastSearchLat = issData.latitude;
            lastSearchLon = issData.longitude;
            lastNearestResult = nearest;
            return nearest;
        }

        async function findAndPlayNearestSound() {
            if (isFindingSound) return;
            isFindingSound = true;
            try {
                const nearest = findNearestSoundLocation();
                if (!nearest) return;
                const quality = calculateSignalQuality(nearest.distance);
                updateCRTEffects(quality);
                updateAudioSignalQuality(quality);
                if (!currentSoundLocation || currentSoundLocation.identifier !== nearest.identifier) {
                    currentSoundLocation = nearest;
                    if (soundFetchController) soundFetchController.abort();
                    const controller = new AbortController();
                    soundFetchController = controller;
                    const locationInfo = await geocodeLocation(nearest.lat, nearest.lng, controller.signal);
                    if (!controller.signal.aborted) {
                        currentLocationInfo = locationInfo;
                        const track = { identifier: nearest.identifier, title: nearest.title, artist: nearest.creator, locationName: nearest.locationName };
                        await playTrack(track, controller.signal);
                    }
                } else {
                    currentSoundLocation.distance = nearest.distance;
                }
            } finally {
                isFindingSound = false;
            }
        }

        // === WebAudio ===
        function initWebAudio() {
            if (audioContext) return;
            try {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                gainNode1 = audioContext.createGain();
                gainNode2 = audioContext.createGain();
                filterNode = audioContext.createBiquadFilter();
                filterNode.type = 'lowpass';
                filterNode.frequency.value = 22000;
                filterNode.Q.value = 0.5;
                noiseGainNode = audioContext.createGain();
                noiseGainNode.gain.value = 0;
                const bufferSize = audioContext.sampleRate * 2;
                const noiseBuffer = audioContext.createBuffer(1, bufferSize, audioContext.sampleRate);
                const noiseData = noiseBuffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) noiseData[i] = (Math.random() * 2 - 1) * 0.3;
                noiseSource = audioContext.createBufferSource();
                noiseSource.buffer = noiseBuffer;
                noiseSource.loop = true;
                noiseSource.connect(noiseGainNode);
                noiseGainNode.connect(audioContext.destination);
                noiseSource.start();
                const source1 = audioContext.createMediaElementSource(audioPlayer1);
                const source2 = audioContext.createMediaElementSource(audioPlayer2);
                source1.connect(gainNode1);
                source2.connect(gainNode2);
                gainNode1.connect(filterNode);
                gainNode2.connect(filterNode);
                filterNode.connect(audioContext.destination);
            } catch (e) {
                console.error('WebAudio init failed:', e);
                audioContext = null;
            }
        }

        function updateAudioSignalQuality(quality) {
            if (!audioContext || !filterNode) return;
            const now = audioContext.currentTime;
            filterNode.frequency.setTargetAtTime(800 + quality * 21200, now, 0.3);
            noiseGainNode.gain.setTargetAtTime((1 - quality) * 0.08, now, 0.3);
        }

        async function playTrack(track, signal) {
            currentTrack = track;
            if (crossfadeIntervalId !== null) { clearInterval(crossfadeIntervalId); crossfadeIntervalId = null; }
            const mp3Url = await getAudioUrl(track.identifier, signal);
            if (signal && signal.aborted) return;
            if (!mp3Url) { console.error('No MP3 found for:', track.identifier); return; }
            console.log('Playing:', mp3Url);
            const currentPlayer = activePlayer === 1 ? audioPlayer1 : audioPlayer2;
            const nextPlayer = activePlayer === 1 ? audioPlayer2 : audioPlayer1;
            nextPlayer.src = mp3Url;
            nextPlayer.volume = 0;
            nextPlayer.loop = true;
            nextPlayer.play().then(() => {
                if (signal && signal.aborted) { nextPlayer.pause(); return; }
                initWebAudio();
                isPlaying = true;
                crossfade(currentPlayer, nextPlayer);
                activePlayer = activePlayer === 1 ? 2 : 1;
                render();
            }).catch(err => {
                if (signal && signal.aborted) return;
                console.error("Playback error:", err);
                currentPlayer.src = mp3Url;
                currentPlayer.volume = isMuted ? 0 : volume;
                currentPlayer.loop = true;
                currentPlayer.play().then(() => { isPlaying = true; render(); }).catch(e => console.error("Fallback playback error:", e));
            });
            render();
        }

        function crossfade(fadeOut, fadeIn) {
            if (crossfadeIntervalId !== null) { clearInterval(crossfadeIntervalId); crossfadeIntervalId = null; }
            if (audioContext && gainNode1 && gainNode2) {
                const now = audioContext.currentTime;
                const dur = CROSSFADE_DURATION / 1000;
                const fadeOutGain = fadeOut === audioPlayer1 ? gainNode1 : gainNode2;
                const fadeInGain = fadeIn === audioPlayer1 ? gainNode1 : gainNode2;
                const vol = isMuted ? 0 : volume;
                fadeOutGain.gain.setValueAtTime(vol, now);
                fadeOutGain.gain.linearRampToValueAtTime(0, now + dur);
                fadeInGain.gain.setValueAtTime(0, now);
                fadeInGain.gain.linearRampToValueAtTime(vol, now + dur);
                fadeOut.volume = 1;
                fadeIn.volume = 1;
                setTimeout(() => { fadeOut.pause(); fadeOut.src = ''; }, CROSSFADE_DURATION + 50);
                return;
            }
            const steps = 20;
            const stepTime = CROSSFADE_DURATION / steps;
            let step = 0;
            const startTime = performance.now();
            const interval = setInterval(() => {
                step++;
                const elapsed = performance.now() - startTime;
                const progress = Math.min(1, elapsed / CROSSFADE_DURATION);
                fadeOut.volume = Math.max(0, (1 - progress) * (isMuted ? 0 : volume));
                fadeIn.volume = progress * (isMuted ? 0 : volume);
                if (progress >= 1 || step >= steps) { clearInterval(interval); crossfadeIntervalId = null; fadeOut.pause(); fadeOut.src = ''; }
            }, stepTime);
            crossfadeIntervalId = interval;
        }

        function setVolume(newVolume) {
            volume = newVolume;
            if (audioContext && gainNode1 && gainNode2) {
                const activeGain = activePlayer === 1 ? gainNode1 : gainNode2;
                activeGain.gain.setTargetAtTime(isMuted ? 0 : volume, audioContext.currentTime, 0.05);
            } else {
                const currentPlayer = activePlayer === 1 ? audioPlayer1 : audioPlayer2;
                if (!isMuted) currentPlayer.volume = volume;
            }
            updateVolumeSlider();
        }

        function toggleMute() {
            isMuted = !isMuted;
            if (audioContext && gainNode1 && gainNode2) {
                const activeGain = activePlayer === 1 ? gainNode1 : gainNode2;
                activeGain.gain.setTargetAtTime(isMuted ? 0 : volume, audioContext.currentTime, 0.05);
            } else {
                const currentPlayer = activePlayer === 1 ? audioPlayer1 : audioPlayer2;
                currentPlayer.volume = isMuted ? 0 : volume;
            }
            render();
        }

        function updateVolumeSlider() {
            const slider = document.getElementById('volumeSlider');
            if (slider) slider.style.setProperty('--volume-percent', `${volume * 100}%`);
        }

        // =============================================
        // REVEAL MAP (shown after teletype decode)
        // =============================================

        let revealMap = null;

        function showRevealMap(retries) {
            retries = retries || 0;
            if (typeof L === 'undefined') {
                // Leaflet not loaded yet, retry up to 10 times
                if (retries < 10) {
                    setTimeout(() => showRevealMap(retries + 1), 300);
                }
                return;
            }

            const container = document.getElementById('revealMapContainer');
            if (!container || revealMap) return;

            // Load Leaflet CSS if needed
            if (!document.querySelector('link[href*="leaflet.css"]')) {
                const link = document.createElement('link');
                link.rel = 'stylesheet';
                link.href = 'https://unpkg.com/leaflet@1.9.4/dist/leaflet.css';
                document.head.appendChild(link);
            }

            const lat = issData ? issData.latitude : 0;
            const lng = issData ? issData.longitude : 0;

            revealMap = L.map('revealMapContainer', {
                center: [lat, lng],
                zoom: 3,
                minZoom: 2,
                maxZoom: 6,
                zoomControl: false,
                attributionControl: true,
                dragging: false,
                scrollWheelZoom: false,
                doubleClickZoom: false,
                touchZoom: false,
                worldCopyJump: true
            });

            // Same tile layer as original
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                attribution: '&copy; <a href="https://carto.com/">CARTO</a>',
                subdomains: 'abcd',
                maxZoom: 19
            }).addTo(revealMap);

            // ISS marker
            const issIcon = L.divIcon({
                className: 'leaflet-iss-marker',
                html: '<div class="iss-pulse"></div><div class="iss-icon">X</div>',
                iconSize: [28, 28],
                iconAnchor: [14, 14]
            });
            L.marker([lat, lng], { icon: issIcon, zIndexOffset: 1000 }).addTo(revealMap);

            // Sound marker + line
            if (currentSoundLocation) {
                const soundIcon = L.divIcon({
                    className: 'leaflet-sound-marker',
                    html: '<div class="sound-icon">S</div>',
                    iconSize: [22, 22],
                    iconAnchor: [11, 11]
                });
                L.marker([currentSoundLocation.lat, currentSoundLocation.lng], { icon: soundIcon, zIndexOffset: 500 }).addTo(revealMap);

                // Dashed line between ISS and sound
                L.polyline([[lat, lng], [currentSoundLocation.lat, currentSoundLocation.lng]], {
                    color: '#FF00FF', weight: 2, opacity: 0.7, dashArray: '6, 4'
                }).addTo(revealMap);

                // Fit both markers in view with padding
                const bounds = L.latLngBounds([[lat, lng], [currentSoundLocation.lat, currentSoundLocation.lng]]);
                revealMap.fitBounds(bounds, { padding: [30, 30], maxZoom: 5 });
            }

            // Force size recalculation + scroll into view
            setTimeout(() => {
                if (revealMap) revealMap.invalidateSize();
                container.scrollIntoView({ behavior: 'smooth', block: 'end' });
            }, 200);
        }

        function destroyRevealMap() {
            if (revealMap) {
                revealMap.remove();
                revealMap = null;
            }
        }

        // =============================================
        // ECOUTE AVEUGLE - State Machine
        // =============================================

        const ECOUTE_DURATION = 60;
        const HINT_REVEAL_AT = 30;
        const TELETYPE_CHAR_DELAY = 50;
        const TELETYPE_LINE_DELAY = 300;

        let gamePhase = 'ecoute';
        let countdownTimer = null;
        let countdownSeconds = 60;
        let orbitCount = 0;
        let hintRevealed = false;
        let teletypeTimeout = null;

        function formatCoordinate(value, posDir, negDir) {
            const dir = value >= 0 ? posDir : negDir;
            return Math.abs(value).toFixed(1) + '\u00B0' + dir;
        }

        function redactCoordinate(value, posDir, negDir) {
            const dir = value >= 0 ? posDir : negDir;
            return Math.abs(value).toFixed(1).replace(/\d/g, '\u2588') + '\u00B0' + dir;
        }

        function formatCountdown(seconds) {
            const m = Math.floor(seconds / 60);
            const s = seconds % 60;
            return String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
        }

        function startEcoute() {
            gamePhase = 'ecoute';
            countdownSeconds = ECOUTE_DURATION;
            hintRevealed = false;
            if (countdownTimer) clearInterval(countdownTimer);
            if (teletypeTimeout) clearTimeout(teletypeTimeout);
            destroyRevealMap();
            render();
            findAndPlayNearestSound();

            countdownTimer = setInterval(() => {
                countdownSeconds--;
                if (countdownSeconds <= HINT_REVEAL_AT && !hintRevealed) {
                    hintRevealed = true;
                }
                // Update only the dynamic parts during countdown
                const timerEl = document.getElementById('countdownDisplay');
                if (timerEl) timerEl.textContent = formatCountdown(countdownSeconds);
                const hintEl = document.getElementById('metadataHint');
                if (hintEl && hintRevealed) {
                    hintEl.classList.add('visible');
                    if (issData) {
                        hintEl.innerHTML = 'SIGNAL: ' + signalQuality.toFixed(2) + '&nbsp;&nbsp;&nbsp;&nbsp;LATITUDE: ' + redactCoordinate(issData.latitude, 'N', 'S');
                    }
                }
                if (countdownSeconds <= 0) {
                    clearInterval(countdownTimer);
                    countdownTimer = null;
                    startDecodage();
                }
            }, 1000);
        }

        function startDecodage() {
            gamePhase = 'decodage';
            if (countdownTimer) { clearInterval(countdownTimer); countdownTimer = null; }

            const lines = [];
            lines.push('DECODAGE EN COURS...');
            lines.push('=====================');
            if (issData) {
                lines.push('POSITION ISS: ' + formatCoordinate(issData.latitude, 'N', 'S') + '  ' + formatCoordinate(issData.longitude, 'E', 'W'));
                lines.push('ALTITUDE: ' + Math.round(issData.altitude) + ' KM');
                lines.push('VITESSE: ' + Math.round(issData.velocity).toLocaleString() + ' KM/H');
            } else {
                lines.push('POSITION ISS: INCONNUE');
            }
            lines.push('');
            lines.push('SON CAPTE A PROXIMITE DE:');
            if (currentLocationInfo) {
                if (currentLocationInfo.city) {
                    lines.push('> ' + currentLocationInfo.city + (currentLocationInfo.region && currentLocationInfo.region !== currentLocationInfo.city ? ', ' + currentLocationInfo.region : ''));
                }
                if (currentLocationInfo.country) lines.push('> ' + currentLocationInfo.country);
                const localTime = currentLocationInfo.timezone ? getLocalTime(currentLocationInfo.timezone) : null;
                if (localTime) lines.push('> ' + localTime + ' HEURE LOCALE');
            } else if (currentSoundLocation) {
                lines.push('> ' + (currentSoundLocation.locationName || 'Lieu inconnu'));
            } else {
                lines.push('> LIEU INCONNU');
            }
            lines.push('');
            if (currentSoundLocation) {
                lines.push('DISTANCE SIGNAL: ' + Math.round(currentSoundLocation.distance) + ' KM');
            }
            const qualPercent = Math.round(signalQuality * 100);
            const filledBlocks = Math.round(signalQuality * 10);
            const qualBar = '\u2588'.repeat(filledBlocks) + '\u2591'.repeat(10 - filledBlocks);
            lines.push('QUALITE: ' + qualBar + ' ' + qualPercent + '%');

            // Force synchronous render so teletypeOutput exists immediately
            renderScheduled = false;
            renderImpl();

            const outputEl = document.getElementById('teletypeOutput');
            if (outputEl) {
                teletype(lines, outputEl, () => startAttente());
            } else {
                console.error('teletypeOutput not found after render');
                startAttente();
            }
        }

        function startAttente() {
            gamePhase = 'attente';
            orbitCount++;

            const outputEl = document.getElementById('teletypeOutput');
            if (outputEl && !document.getElementById('attentePrompt')) {
                // Add reveal map
                const mapDiv = document.createElement('div');
                mapDiv.id = 'revealMapContainer';
                mapDiv.className = 'reveal-map-container';
                outputEl.appendChild(mapDiv);

                // Add continue prompt
                const prompt = document.createElement('div');
                prompt.id = 'attentePrompt';
                prompt.className = 'attente-prompt';
                prompt.textContent = '[CONNEXION] POUR CONTINUER';
                outputEl.appendChild(prompt);

                // Init map after DOM update
                requestAnimationFrame(() => showRevealMap());
            }

            const footerOrbits = document.getElementById('footerOrbits');
            if (footerOrbits) footerOrbits.textContent = 'ORBITE #' + orbitCount;

            function onContinue() {
                document.removeEventListener('click', onContinue);
                document.removeEventListener('keydown', onContinue);
                startEcoute();
            }
            document.addEventListener('click', onContinue, { once: true });
            document.addEventListener('keydown', onContinue, { once: true });
        }

        function teletype(lines, element, callback) {
            if (teletypeTimeout) clearTimeout(teletypeTimeout);
            element.innerHTML = '';
            let lineIndex = 0;
            let charIndex = 0;

            const cursor = document.createElement('span');
            cursor.className = 'teletype-cursor';
            cursor.textContent = '\u2588';
            element.appendChild(cursor);

            function typeNext() {
                if (lineIndex >= lines.length) {
                    cursor.remove();
                    if (callback) callback();
                    return;
                }
                const currentLine = lines[lineIndex];
                if (charIndex === 0 && lineIndex > 0) {
                    cursor.remove();
                    element.appendChild(document.createElement('br'));
                    element.appendChild(cursor);
                }
                if (charIndex < currentLine.length) {
                    cursor.remove();
                    element.insertBefore(document.createTextNode(currentLine[charIndex]), null);
                    element.appendChild(cursor);
                    charIndex++;
                    teletypeTimeout = setTimeout(typeNext, TELETYPE_CHAR_DELAY);
                } else {
                    lineIndex++;
                    charIndex = 0;
                    teletypeTimeout = setTimeout(typeNext, TELETYPE_LINE_DELAY);
                }
            }
            typeNext();
        }

        // =============================================
        // RENDER
        // =============================================

        function render() {
            if (renderScheduled) return;
            renderScheduled = true;
            requestAnimationFrame(() => {
                renderScheduled = false;
                renderImpl();
            });
        }

        function renderImpl() {
            const screenContent = document.getElementById('screenContent');

            if (connectionStep === 0) {
                screenContent.innerHTML =
                    '<div class="init-screen">' +
                        '<div class="init-dot">\u25CF</div>' +
                        '<p class="init-text">CONNEXION 3615 TERRE...</p>' +
                    '</div>';
                return;
            }

            if (connectionStep === 1) {
                screenContent.innerHTML =
                    '<div class="loading-screen">' +
                        '<p>CONNEXION AU SATELLITE ISS...</p>' +
                        '<p>CHARGEMENT DES SONS TERRESTRES...</p>' +
                        '<p>' + (soundLocations.length > 0 ? soundLocations.length.toLocaleString() + ' LIEUX SONORES CHARGES' : '') + '</p>' +
                        '<p style="opacity:0.6;font-size:0.8em;margin-top:0.5rem;">Ce terminal capte les sons du monde au passage de la Station Spatiale Internationale. Les enregistrements proviennent de l\'archive radio aporee maps.</p>' +
                        '<p style="animation:blink 1s step-end infinite;">VEUILLEZ PATIENTER...</p>' +
                    '</div>';
                return;
            }

            // === connectionStep 2 ===
            // Don't rebuild during decodage/attente (teletype would be destroyed)
            if (gamePhase === 'attente') {
                updateDynamicParts();
                return;
            }
            if (gamePhase === 'decodage' && document.getElementById('teletypeOutput')) {
                updateDynamicParts();
                return;
            }

            const statusClass = connectionError ? 'disconnected' : (isLoadingISS ? 'loading' : 'connected');

            // Build sound bars
            let barsHtml = '<div class="sound-bars-large">';
            for (let i = 0; i < 10; i++) {
                barsHtml += '<div class="sound-bar' + (isPlaying && !isMuted ? '' : ' paused') + '"></div>';
            }
            barsHtml += '</div>';

            // Audio controls
            const audioHtml =
                '<div class="audio-controls">' +
                    '<div class="volume-control">' +
                        '<span class="volume-label" id="volLabel">VOL</span>' +
                        '<input type="range" id="volumeSlider" class="volume-slider" min="0" max="100" value="' + (volume * 100) + '" style="--volume-percent:' + (volume * 100) + '%" aria-label="Volume" aria-labelledby="volLabel" onchange="setVolume(this.value/100)">' +
                    '</div>' +
                    '<button class="mute-btn ' + (isMuted ? 'muted' : '') + '" onclick="toggleMute()" aria-label="' + (isMuted ? 'Reactiver le son' : 'Couper le son') + '">' +
                        (isMuted ? 'MUET' : 'SON') +
                    '</button>' +
                '</div>';

            let mainHtml = '';
            if (gamePhase === 'ecoute') {
                mainHtml =
                    '<div class="ecoute-phase">' +
                        barsHtml +
                        '<div class="ecoute-label">ECOUTE...</div>' +
                        '<div class="countdown-timer" id="countdownDisplay">' + formatCountdown(countdownSeconds) + '</div>' +
                        '<div class="metadata-hint' + (hintRevealed ? ' visible' : '') + '" id="metadataHint">' +
                            (hintRevealed && issData ? 'SIGNAL: ' + signalQuality.toFixed(2) + '&nbsp;&nbsp;&nbsp;&nbsp;LATITUDE: ' + redactCoordinate(issData.latitude, 'N', 'S') : '') +
                        '</div>' +
                    '</div>';
            } else if (gamePhase === 'decodage') {
                mainHtml = '<div id="teletypeOutput" class="decodage-screen"></div>';
            }

            screenContent.innerHTML =
                '<div class="minitel-header" id="miniHeader">' +
                    '<div class="header-left"><span class="header-iss">3615 TERRE</span></div>' +
                    '<div class="header-right"><div class="status-dot ' + statusClass + '" id="statusDot"></div></div>' +
                '</div>' +
                '<div style="flex:1;display:flex;flex-direction:column;min-height:0;padding-top:0.5rem;">' +
                    '<div class="title-bar">Composez la Terre depuis l\'orbite</div>' +
                    '<div style="flex:1;display:flex;flex-direction:column;min-height:0;">' +
                        mainHtml +
                    '</div>' +
                    audioHtml +
                '</div>' +
                '<div class="footer" id="footerSlot">' +
                    '<span class="orbit-counter" id="footerOrbits">ORBITE #' + orbitCount + '</span>' +
                    '<span id="footerSounds">' + soundLocations.length.toLocaleString() + ' sons</span>' +
                    '<span id="footerStatus" style="animation:' + (isLoadingISS ? 'pulse 2s infinite' : 'none') + '">' +
                        (connectionError ? 'ERREUR SIGNAL' : (isLoadingISS ? 'RECEPTION...' : 'CONNECTE')) +
                    '</span>' +
                '</div>';

            // Audio unlock prompt
            if (!audioUnlocked) {
                const crtScreen = document.querySelector('.crt-screen');
                if (crtScreen && !document.getElementById('audioUnlockPrompt')) {
                    const prompt = document.createElement('div');
                    prompt.id = 'audioUnlockPrompt';
                    prompt.className = 'audio-unlock-prompt';
                    prompt.textContent = 'CLIQUEZ POUR ACTIVER LE SON';
                    prompt.setAttribute('role', 'button');
                    crtScreen.appendChild(prompt);
                }
            }

            updateVolumeSlider();
        }

        function updateDynamicParts() {
            const statusDot = document.getElementById('statusDot');
            if (statusDot) {
                statusDot.className = 'status-dot ' + (connectionError ? 'disconnected' : (isLoadingISS ? 'loading' : 'connected'));
            }
            const footerSounds = document.getElementById('footerSounds');
            if (footerSounds) footerSounds.textContent = soundLocations.length.toLocaleString() + ' sons';
            const footerStatus = document.getElementById('footerStatus');
            if (footerStatus) {
                footerStatus.textContent = connectionError ? 'ERREUR SIGNAL' : (isLoadingISS ? 'RECEPTION...' : 'CONNECTE');
                footerStatus.style.animation = isLoadingISS ? 'pulse 2s infinite' : 'none';
                footerStatus.style.color = connectionError ? '#FF0000' : '';
            }
            updateVolumeSlider();
        }

        // =============================================
        // BOOT SEQUENCE
        // =============================================

        async function startConnectionSequence() {
            render();
            setTimeout(() => {
                connectionStep = 1;
                render();
                Promise.all([fetchSoundLocations(), fetchISS()]).then(() => {
                    connectionStep = 2;
                    startEcoute();

                    function scheduleNextFetch() {
                        if (issPollIntervalId !== null) clearTimeout(issPollIntervalId);
                        issPollIntervalId = setTimeout(() => {
                            fetchISS().finally(() => {
                                if (connectionStep === 2) scheduleNextFetch();
                            });
                        }, ISS_REFRESH_RATE);
                    }
                    scheduleNextFetch();

                    document.addEventListener('visibilitychange', () => {
                        if (document.hidden) {
                            if (issPollIntervalId !== null) { clearTimeout(issPollIntervalId); issPollIntervalId = null; }
                        } else {
                            scheduleNextFetch();
                        }
                    });
                });
            }, 1000);
        }

        function init() {
            render();
            startConnectionSequence();

            function unlockAudio() {
                if (audioUnlocked) return;
                audioPlayer1.play().then(() => {
                    audioPlayer1.pause();
                    audioUnlocked = true;
                    const prompt = document.getElementById('audioUnlockPrompt');
                    if (prompt) prompt.style.display = 'none';
                    if (currentTrack && !isPlaying) {
                        const currentPlayer = activePlayer === 1 ? audioPlayer1 : audioPlayer2;
                        if (currentPlayer.src) {
                            currentPlayer.play().then(() => { isPlaying = true; render(); }).catch(console.error);
                        }
                    }
                }).catch(() => {
                    audioPlayer1.src = 'data:audio/wav;base64,UklGRigAAABXQVZFZm10IBIAAAABAAEARKwAAIhYAQACABAAAABkYXRhAgAAAAEA';
                    audioPlayer1.play().then(() => {
                        audioPlayer1.pause();
                        audioPlayer1.src = '';
                        audioUnlocked = true;
                        const prompt = document.getElementById('audioUnlockPrompt');
                        if (prompt) prompt.style.display = 'none';
                    }).catch(console.error);
                });
            }
            document.addEventListener('click', unlockAudio, { once: true });
            document.addEventListener('touchstart', unlockAudio, { once: true });
        }

        window.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
