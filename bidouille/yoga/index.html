<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yoga Form Analyzer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=DM+Mono:wght@300;400&display=swap');

  :root {
    --sage: #8fa88a;
    --moss: #4a5e45;
    --sand: #e8dfc8;
    --clay: #c4a882;
    --dark: #1a1f18;
    --mist: #f2ede4;
    --accent: #d4826a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--dark);
    color: var(--mist);
    font-family: 'Cormorant Garamond', serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Grain texture overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 1000;
    opacity: 0.4;
  }

  .app {
    display: grid;
    grid-template-columns: 1fr 420px;
    grid-template-rows: auto 1fr;
    min-height: 100vh;
    gap: 0;
  }

  header {
    grid-column: 1 / -1;
    padding: 28px 48px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid rgba(143,168,138,0.15);
  }

  .logo {
    display: flex;
    align-items: baseline;
    gap: 12px;
  }

  .logo h1 {
    font-size: 1.8rem;
    font-weight: 300;
    letter-spacing: 0.08em;
    color: var(--sand);
  }

  .logo span {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    color: var(--sage);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    padding: 3px 8px;
    border: 1px solid var(--sage);
    opacity: 0.7;
  }

  .status-dot {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    color: var(--sage);
    letter-spacing: 0.1em;
  }

  .dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--sage);
    animation: pulse 2s ease-in-out infinite;
  }

  .dot.analyzing { background: var(--accent); animation: pulse-fast 0.6s ease-in-out infinite; }
  .dot.ready { background: #7aab6e; animation: none; }

  @keyframes pulse { 0%,100%{opacity:0.4} 50%{opacity:1} }
  @keyframes pulse-fast { 0%,100%{opacity:0.5} 50%{opacity:1} }

  /* Camera section */
  .camera-section {
    padding: 40px 48px 40px 48px;
    display: flex;
    flex-direction: column;
    gap: 24px;
    border-right: 1px solid rgba(143,168,138,0.1);
  }

  .camera-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--clay);
    margin-bottom: 4px;
  }

  .video-container {
    position: relative;
    background: #0d1009;
    border: 1px solid rgba(143,168,138,0.2);
    overflow: hidden;
    aspect-ratio: 4/3;
    width: 100%;
  }

  video, canvas {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  #captureCanvas { display: none; }

  .video-overlay {
    position: absolute;
    inset: 0;
    pointer-events: none;
  }

  /* Corner brackets */
  .corner {
    position: absolute;
    width: 24px;
    height: 24px;
    border-color: var(--sage);
    border-style: solid;
    opacity: 0.6;
  }
  .corner.tl { top: 12px; left: 12px; border-width: 1px 0 0 1px; }
  .corner.tr { top: 12px; right: 12px; border-width: 1px 1px 0 0; }
  .corner.bl { bottom: 12px; left: 12px; border-width: 0 0 1px 1px; }
  .corner.br { bottom: 12px; right: 12px; border-width: 0 1px 1px 0; }

  .scan-line {
    position: absolute;
    left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--sage), transparent);
    opacity: 0;
    top: 0;
  }

  .scan-line.active {
    opacity: 0.4;
    animation: scan 2s ease-in-out infinite;
  }

  @keyframes scan { 0%{top:0%} 100%{top:100%} }

  .camera-placeholder {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    color: rgba(143,168,138,0.4);
  }

  .camera-placeholder svg { width: 48px; height: 48px; opacity: 0.5; }
  .camera-placeholder p { font-size: 0.9rem; letter-spacing: 0.05em; }

  .controls {
    display: flex;
    gap: 12px;
    align-items: center;
  }

  .btn {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 12px 24px;
    border: 1px solid;
    background: transparent;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }

  .btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: currentColor;
    opacity: 0;
    transition: opacity 0.2s;
  }

  .btn:hover::before { opacity: 0.08; }

  .btn-primary {
    color: var(--sand);
    border-color: var(--sage);
  }

  .btn-capture {
    color: var(--mist);
    border-color: var(--accent);
    flex: 1;
  }

  .btn-capture:disabled {
    opacity: 0.3;
    cursor: not-allowed;
  }

  .btn:disabled::before { display: none; }

  .pose-selector {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .pose-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .chip {
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 6px 14px;
    border: 1px solid rgba(143,168,138,0.25);
    color: rgba(232,223,200,0.5);
    cursor: pointer;
    transition: all 0.2s;
    background: transparent;
    font-family: 'DM Mono', monospace;
  }

  .chip:hover, .chip.active {
    border-color: var(--clay);
    color: var(--clay);
  }

  /* Analysis panel */
  .analysis-panel {
    padding: 40px 36px;
    display: flex;
    flex-direction: column;
    gap: 32px;
    overflow-y: auto;
  }

  .panel-section {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .section-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--sage);
    padding-bottom: 8px;
    border-bottom: 1px solid rgba(143,168,138,0.15);
  }

  .score-display {
    display: flex;
    align-items: baseline;
    gap: 12px;
  }

  .score-number {
    font-size: 5rem;
    font-weight: 300;
    line-height: 1;
    color: var(--sand);
    transition: all 0.5s;
  }

  .score-label {
    font-size: 0.85rem;
    color: var(--clay);
    font-style: italic;
  }

  .score-bar-container {
    height: 2px;
    background: rgba(143,168,138,0.15);
    position: relative;
    overflow: hidden;
  }

  .score-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--moss), var(--clay));
    transition: width 0.8s cubic-bezier(0.4,0,0.2,1);
    width: 0%;
  }

  .feedback-list {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .feedback-item {
    display: flex;
    gap: 12px;
    align-items: flex-start;
    padding: 12px;
    border: 1px solid rgba(143,168,138,0.1);
    animation: fadeIn 0.4s ease both;
  }

  @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:none} }

  .feedback-icon {
    font-size: 0.9rem;
    flex-shrink: 0;
    margin-top: 1px;
  }

  .feedback-text {
    font-size: 0.95rem;
    font-weight: 300;
    line-height: 1.6;
    color: var(--mist);
  }

  .feedback-item.good { border-color: rgba(122,171,110,0.2); }
  .feedback-item.warn { border-color: rgba(196,168,130,0.2); }
  .feedback-item.tip  { border-color: rgba(212,130,106,0.2); }

  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: rgba(232,223,200,0.2);
    font-style: italic;
    font-size: 1.05rem;
    line-height: 1.8;
  }

  .analyzing-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    padding: 32px;
  }

  .spinner {
    width: 32px;
    height: 32px;
    border: 1px solid rgba(143,168,138,0.2);
    border-top-color: var(--sage);
    border-radius: 50%;
    animation: spin 1s linear infinite;
  }

  @keyframes spin { to{transform:rotate(360deg)} }

  .analyzing-text {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    color: var(--sage);
    text-transform: uppercase;
  }

  .history-thumbs {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .thumb {
    width: 56px;
    height: 56px;
    border: 1px solid rgba(143,168,138,0.2);
    object-fit: cover;
    cursor: pointer;
    transition: border-color 0.2s;
    opacity: 0.6;
  }

  .thumb:hover { border-color: var(--clay); opacity: 1; }

  /* Breathing prompt */
  .breathe {
    font-size: 0.7rem;
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--sage);
    opacity: 0;
    text-align: center;
    animation: breathe 6s ease-in-out infinite;
  }

  @keyframes breathe {
    0%,100%{opacity:0} 25%{opacity:0.7} 50%{opacity:0.3} 75%{opacity:0.7}
  }

  .error-msg {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    color: var(--accent);
    padding: 10px 14px;
    border: 1px solid rgba(212,130,106,0.25);
    letter-spacing: 0.05em;
  }
</style>
</head>
<body>

<div class="app">
  <header>
    <div class="logo">
      <h1>Āsana Vision</h1>
      <span>AI Form Analyzer</span>
    </div>
    <div class="status-dot">
      <div class="dot" id="statusDot"></div>
      <span id="statusText">initializing</span>
    </div>
  </header>

  <section class="camera-section">
    <div>
      <div class="camera-label">Live Camera</div>
      <div class="video-container" id="videoContainer">
        <video id="video" autoplay playsinline muted></video>
        <canvas id="captureCanvas"></canvas>
        <div class="video-overlay">
          <div class="corner tl"></div>
          <div class="corner tr"></div>
          <div class="corner bl"></div>
          <div class="corner br"></div>
          <div class="scan-line" id="scanLine"></div>
        </div>
        <div class="camera-placeholder" id="placeholder">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
            <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
            <circle cx="12" cy="13" r="4"/>
          </svg>
          <p>Camera not started</p>
        </div>
      </div>
    </div>

    <div class="controls">
      <button class="btn btn-primary" id="startBtn" onclick="startCamera()">Start camera</button>
      <button class="btn btn-capture" id="captureBtn" onclick="analyzeFrame()" disabled>Analyze pose</button>
    </div>

    <div class="pose-selector">
      <div class="camera-label">Target pose (optional)</div>
      <div class="pose-chips">
        <button class="chip active" onclick="selectPose(this,'')">Auto-detect</button>
        <button class="chip" onclick="selectPose(this,'Warrior I')">Warrior I</button>
        <button class="chip" onclick="selectPose(this,'Warrior II')">Warrior II</button>
        <button class="chip" onclick="selectPose(this,'Downward Dog')">Downward Dog</button>
        <button class="chip" onclick="selectPose(this,'Tree Pose')">Tree Pose</button>
        <button class="chip" onclick="selectPose(this,'Triangle Pose')">Triangle</button>
        <button class="chip" onclick="selectPose(this,'Chair Pose')">Chair Pose</button>
        <button class="chip" onclick="selectPose(this,'Child\'s Pose')">Child's Pose</button>
        <button class="chip" onclick="selectPose(this,'Cobra Pose')">Cobra</button>
      </div>
    </div>

    <div class="breathe">inhale · hold · exhale</div>

    <div id="errorMsg"></div>
  </section>

  <aside class="analysis-panel">
    <div class="panel-section">
      <div class="section-label">Form Score</div>
      <div id="scoreSection">
        <div class="score-display">
          <div class="score-number" id="scoreNum">—</div>
          <div class="score-label" id="scoreLabel">awaiting analysis</div>
        </div>
        <div class="score-bar-container">
          <div class="score-bar" id="scoreBar"></div>
        </div>
      </div>
    </div>

    <div class="panel-section">
      <div class="section-label">Feedback</div>
      <div id="feedbackArea">
        <div class="empty-state">
          Take a pose,<br>then capture to receive<br>detailed form guidance.
        </div>
      </div>
    </div>

    <div class="panel-section" id="historySection" style="display:none">
      <div class="section-label">Session History</div>
      <div class="history-thumbs" id="historyThumbs"></div>
    </div>
  </aside>
</div>

<script>
  let stream = null;
  let selectedPose = '';
  const video = document.getElementById('video');
  const canvas = document.getElementById('captureCanvas');
  const ctx = canvas.getContext('2d');
  const captureBtn = document.getElementById('captureBtn');
  const statusDot = document.getElementById('statusDot');
  const statusText = document.getElementById('statusText');
  const scanLine = document.getElementById('scanLine');
  const history = [];

  function setStatus(state, text) {
    statusDot.className = 'dot ' + state;
    statusText.textContent = text;
  }

  function selectPose(el, pose) {
    document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    el.classList.add('active');
    selectedPose = pose;
  }

  async function startCamera() {
    try {
      stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: 'user', width: { ideal: 1280 }, height: { ideal: 960 } }
      });
      video.srcObject = stream;
      document.getElementById('placeholder').style.display = 'none';
      document.getElementById('startBtn').style.display = 'none';
      captureBtn.disabled = false;
      setStatus('ready', 'camera live');
    } catch(e) {
      showError('Camera access denied. Please allow camera permissions.');
    }
  }

  function captureFrame() {
    canvas.width = video.videoWidth || 640;
    canvas.height = video.videoHeight || 480;
    ctx.drawImage(video, 0, 0);
    return canvas.toDataURL('image/jpeg', 0.85).split(',')[1];
  }

  function showError(msg) {
    const el = document.getElementById('errorMsg');
    el.innerHTML = `<div class="error-msg">${msg}</div>`;
    setTimeout(() => el.innerHTML = '', 5000);
  }

  async function analyzeFrame() {
    if (!stream) return;

    const imageData = captureFrame();

    // Save to history
    const thumbSrc = canvas.toDataURL('image/jpeg', 0.4);
    history.push(thumbSrc);
    updateHistory();

    // UI: analyzing state
    captureBtn.disabled = true;
    scanLine.classList.add('active');
    setStatus('analyzing', 'analyzing...');

    document.getElementById('feedbackArea').innerHTML = `
      <div class="analyzing-state">
        <div class="spinner"></div>
        <div class="analyzing-text">Reading your form</div>
      </div>`;

    const poseInstruction = selectedPose
      ? `The practitioner is attempting ${selectedPose}. Evaluate their form specifically for this pose.`
      : `First identify which yoga pose the practitioner is attempting.`;

    const prompt = `You are an expert yoga instructor analyzing a student's form. ${poseInstruction}

Respond ONLY with a valid JSON object (no markdown, no preamble) with exactly this structure:
{
  "pose": "name of the pose detected",
  "score": <integer 0-100>,
  "scoreLabel": <"Needs Work"|"Fair"|"Good"|"Excellent">,
  "feedback": [
    {"type": "good", "text": "something correct in their form"},
    {"type": "warn", "text": "something to adjust"},
    {"type": "tip", "text": "a technique tip to improve"}
  ]
}

Include 3-6 feedback items total. Be specific, actionable, and encouraging. Focus on alignment, safety, and breath.`;

    try {
      const response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 1000,
          messages: [{
            role: 'user',
            content: [
              { type: 'image', source: { type: 'base64', media_type: 'image/jpeg', data: imageData } },
              { type: 'text', text: prompt }
            ]
          }]
        })
      });

      const data = await response.json();

      if (data.error) throw new Error(data.error.message);

      const raw = data.content.map(b => b.text || '').join('');
      const clean = raw.replace(/```json|```/g, '').trim();
      const result = JSON.parse(clean);

      displayResult(result);
      setStatus('ready', 'analysis complete');

    } catch(e) {
      console.error(e);
      showError('Analysis failed: ' + (e.message || 'unknown error'));
      setStatus('ready', 'camera live');
      document.getElementById('feedbackArea').innerHTML = `<div class="empty-state">Analysis failed. Please try again.</div>`;
    }

    captureBtn.disabled = false;
    scanLine.classList.remove('active');
  }

  function displayResult(result) {
    // Score
    const score = result.score || 0;
    document.getElementById('scoreNum').textContent = score;
    document.getElementById('scoreLabel').textContent = result.scoreLabel || '';
    document.getElementById('scoreBar').style.width = score + '%';

    // Feedback
    const icons = { good: '✦', warn: '◈', tip: '◇' };
    const items = (result.feedback || []).map((f, i) => `
      <div class="feedback-item ${f.type}" style="animation-delay:${i*0.1}s">
        <div class="feedback-icon">${icons[f.type] || '·'}</div>
        <div class="feedback-text">${f.text}</div>
      </div>`).join('');

    document.getElementById('feedbackArea').innerHTML = `
      <div style="font-family:'DM Mono',monospace;font-size:0.6rem;letter-spacing:0.2em;color:var(--clay);margin-bottom:12px;text-transform:uppercase">
        ${result.pose || ''}
      </div>
      <div class="feedback-list">${items}</div>`;
  }

  function updateHistory() {
    if (history.length === 0) return;
    const section = document.getElementById('historySection');
    const thumbsEl = document.getElementById('historyThumbs');
    section.style.display = 'flex';
    thumbsEl.innerHTML = history.slice(-8).map(src =>
      `<img class="thumb" src="${src}" title="Past capture">`
    ).join('');
  }
</script>
</body>
</html>
