<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0a0a14">
    <meta name="description" content="Rotary phone interface — dial a 2-digit code (00..09) to hear a real NASA recording from each body of the solar system.">

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Solar Phone">

    <title>Rotary Phone — Solar System Line</title>
    <link rel="stylesheet" href="css/styles.css?v=181d8907">
</head>
<body>
    <div class="stars" id="stars" aria-hidden="true"></div>

    <main class="phone-stage" id="stage">
        <header class="hud">
            <h1>☎ ROTARY · SOLAR SYSTEM LINE</h1>
            <p class="hint" id="hint">Dial a 2-digit code (00..09) — each one calls a different body in the solar system.</p>
        </header>

        <section class="display" aria-live="polite">
            <span class="display-label">Code</span>
            <span class="display-number" id="display">_ _</span>
            <button class="clear-btn" id="clear" aria-label="Clear code">⟲ clear</button>
        </section>

        <section class="phone" aria-label="Rotary phone — Socotel S63 (PTT, France)">
            <div class="cord" aria-hidden="true"></div>
            <div class="led-button" aria-hidden="true"></div>

            <div class="handset" id="handset" aria-label="Handset">
                <div class="earpiece"></div>
                <div class="bar"></div>
                <div class="mouthpiece"></div>
            </div>

            <div class="cradle-prong cradle-left"></div>
            <div class="cradle-prong cradle-right"></div>

            <div class="card-drawer card-drawer-top" aria-hidden="true">
                <span class="card-number">06 20 83 88 25</span>
            </div>

            <div class="dial-plate">
                <div class="dial-housing">
                    <svg class="finger-stop" viewBox="0 0 100 100" aria-hidden="true">
                        <path d="M 50 8 L 92 8 L 92 50 Z" />
                    </svg>

                    <div class="number-ring" aria-hidden="true">
                        <span class="num" style="--i:0"><b>1</b><i>&nbsp;</i></span>
                        <span class="num" style="--i:1"><b>2</b><i>ABC</i></span>
                        <span class="num" style="--i:2"><b>3</b><i>DEF</i></span>
                        <span class="num" style="--i:3"><b>4</b><i>GHI</i></span>
                        <span class="num" style="--i:4"><b>5</b><i>JKL</i></span>
                        <span class="num" style="--i:5"><b>6</b><i>MN</i></span>
                        <span class="num" style="--i:6"><b>7</b><i>PRS</i></span>
                        <span class="num" style="--i:7"><b>8</b><i>TUV</i></span>
                        <span class="num" style="--i:8"><b>9</b><i>WXY</i></span>
                        <span class="num" style="--i:9"><b>0</b><i>OPÉR.</i></span>
                    </div>

                    <div class="dial" id="dial" role="group" aria-label="Rotary dial">
                        <div class="dial-face">
                            <button class="hole" data-digit="1" style="--i:0" aria-label="1"></button>
                            <button class="hole" data-digit="2" style="--i:1" aria-label="2"></button>
                            <button class="hole" data-digit="3" style="--i:2" aria-label="3"></button>
                            <button class="hole" data-digit="4" style="--i:3" aria-label="4"></button>
                            <button class="hole" data-digit="5" style="--i:4" aria-label="5"></button>
                            <button class="hole" data-digit="6" style="--i:5" aria-label="6"></button>
                            <button class="hole" data-digit="7" style="--i:6" aria-label="7"></button>
                            <button class="hole" data-digit="8" style="--i:7" aria-label="8"></button>
                            <button class="hole" data-digit="9" style="--i:8" aria-label="9"></button>
                            <button class="hole" data-digit="0" style="--i:9" aria-label="0"></button>
                        </div>
                        <div class="dial-center" aria-hidden="true">
                            <div class="ec-label">
                                <span class="ec-top">URGENCES</span>
                                <span class="ec-mid">POMPIERS 18<br>POLICE 17</span>
                                <span class="ec-bot">SAMU 15</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <footer class="signal" id="signal">
            <span class="dot"></span> idle · awaiting your call
        </footer>
    </main>

    <script src="js/script.js?v=af427e89"></script>
</body>
</html>
