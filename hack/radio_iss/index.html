<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#000000">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="25544.fm">
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="icon" href="favicon.ico" type="image/x-icon">
  <link rel="apple-touch-icon" href="share.png">
  <link rel="manifest" href="manifest.webmanifest">
  <title>25544.fm - ISS Orbital Radio</title>

  <meta name="description" content="An immersive ISS (International Space Station) tracker that combines real-time space station visualization with location-based internet radio streaming. Watch the ISS orbit Earth as a pulsating particle in a physics simulation while listening to regional radio stations that automatically switch based on the ISS's current location.">

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="25544.fm - ISS Orbital Radio">
  <meta property="og:description" content="An immersive ISS tracker with real-time visualization and region-based internet radio that switches as the ISS orbits.">
  <meta property="og:image" content="https://mathemagie.github.io/hack/radio_iss/share.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:image:alt" content="25544.fm visualization with pulsating ISS particle and radio UI">

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="25544.fm - ISS Orbital Radio">
  <meta name="twitter:description" content="An immersive ISS tracker with real-time visualization and region-based internet radio that switches as the ISS orbits.">
  <meta name="twitter:image" content="https://mathemagie.github.io/hack/radio_iss/share.png">
  <meta name="twitter:image:alt" content="25544.fm visualization with pulsating ISS particle and radio UI">

  <!-- No cache headers -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">

  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js?v=simplify5"></script>
  <link rel="stylesheet" href="css/styles.css?v=simplify5">
  <!-- Version: simplify pass 1 -->
</head>
<body>
  <div class="radio-ui" id="radio-ui">
    <div class="radio-controls">
      <button id="play-btn" class="play-btn" type="button">▶</button>
      <span id="station-label" class="station-info pulsing">Waiting for ISS location…</span>
      <button id="info-btn" class="info-btn" type="button" aria-label="Show ISS info">ⓘ</button>
    </div>
    <div class="radio-hint">Tap play. Stations follow the ISS.</div>
    <audio id="radio-player" preload="none" style="display: none;"></audio>
    <audio id="radio-player-b" preload="none" style="display: none;"></audio>
  </div>
  
  <!-- ISS Context Mini-overlay -->
  <div class="iss-context-overlay" id="iss-context-overlay" style="display: none;">
    <div class="iss-context-header">
      <h3>ISS Context</h3>
      <button class="iss-context-close" type="button" aria-label="Close ISS context overlay">×</button>
    </div>
    <div class="iss-context-content">
      <button class="iss-context-place" id="iss-place-row" type="button" aria-expanded="false">
        <span class="iss-context-label">Over</span>
        <span class="iss-context-value" id="iss-place">locating…</span>
      </button>
      <div class="iss-context-item iss-context-coords" id="iss-coords-row" hidden>
        <span class="iss-context-label">Position</span>
        <span class="iss-context-value" id="iss-lat-lon">—</span>
      </div>
      <details class="iss-context-controls">
        <summary>Settings</summary>
        <button class="iss-context-toggle" id="path-trace-toggle" type="button">Path Trace: OFF</button>
      </details>
    </div>
  </div>

  <!-- Brand watermark -->
  <div class="brand" aria-hidden="true">25544.fm</div>

  <!-- Fullscreen button positioned in bottom right -->
  <button id="fullscreen-btn" type="button" class="fullscreen-btn-floating" aria-pressed="false" aria-label="Toggle fullscreen">
    <span class="fs-icon" aria-hidden="true">
      <span></span><span></span><span></span><span></span>
    </span>
  </button>
  <script src="js/particles.js?v=simplify5"></script>
  <script src="js/radio.js?v=simplify5"></script>
  <script src="js/geography.js?v=simplify5"></script>
  <script src="js/visualizer.js?v=simplify5"></script>
  <script src="js/main.js?v=simplify5"></script>
</body>
</html>
